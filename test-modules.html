<!DOCTYPE html>
<html>
<head>
  <title>Module Test</title>
</head>
<body>
  <h1>Module Test</h1>
  <div id="output"></div>
  
  <script type="module">
    import { loadJSON } from './docs/js/data.js';
    import { escapeHTML } from './docs/js/utils.js';
    
    const output = document.getElementById('output');
    
    try {
      output.innerHTML = 'Loading data...';
      
      const chunks = await loadJSON('docs/data/chunks.json');
      output.innerHTML = `
        <p>✅ Data loaded successfully!</p>
        <p>Chunks: ${chunks.length}</p>
        <p>First chunk: ${escapeHTML(JSON.stringify(chunks[0], null, 2))}</p>
      `;
    } catch (error) {
      output.innerHTML = `<p>❌ Error: ${escapeHTML(error.message)}</p>`;
      console.error(error);
    }
  </script>
</body>
</html>
